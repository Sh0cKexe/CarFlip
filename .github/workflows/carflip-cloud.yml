name: CarFlip cloud (multi-tenant)

# Tohle je NOVY beh navic k puvodnimu "CarFlip hlidani" (ten zustava beze zmeny
# pro tveho osobniho bota). Tento beh projede VSECHNY aktivni uzivatele webu
# (nastaveni + videno ulozene ve Supabase, ne v gitu).
#
# Spousti se stejne jako puvodni - externim budikem (cron-job.org) přes
# workflow_dispatch. Az bude web/Supabase hotovy, nastav v cron-job.org druhy
# job, ktery bude volat:
#   POST .../actions/workflows/carflip-cloud.yml/dispatches {"ref":"main"}
on:
  workflow_dispatch: {}

concurrency:
  group: carflip-cloud
  cancel-in-progress: false

# Aby program mohl ulozit cache scrapovani (cena_cache/otomoto_cache/...)
# zpatky do repozitare - bez toho by kazdy beh zacinal s prazdnou cache
# a pri vic uzivatelich by rostl pocet HTTP dotazu na inzertni portaly.
permissions:
  contents: write

jobs:
  hlidat_cloud:
    runs-on: ubuntu-latest
    steps:
      - name: Stahnout kod
        uses: actions/checkout@v4

      - name: Nainstalovat Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Nainstalovat knihovny
        run: pip install -r requirements-server.txt

      - name: Spustit CarFlip cloud (vsichni uzivatele)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python main_cloud.py

      - name: Ulozit cache scrapovani zpatky do repozitare
        run: |
          git config user.name "carflip-bot"
          git config user.email "carflip-bot@users.noreply.github.com"
          git add cena_cache.json kurz_cache.json otomoto_cache.json autoscout24_cache.json willhaben_cache.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Zadna zmena cache k ulozeni."
          else
            git commit -m "stav cache (cloud)"
            git pull --rebase --autostash
            git push
          fi
